name: Deploy with OrcaCD
description: A GitHub Action to trigger deployments using OrcaCD
author: OrcaCD

inputs:
  hub:
    description: "The OrcaCD hub URL (e.g., https://orca.example.com)"
    required: true
  syncRepo:
    default: false
    description: "Whether to sync the repository content (compose.yml)"
  pullImages:
    default: false
    description: "Whether to pull the latest container images"

runs:
  using: node24
  main: dist/index.js
